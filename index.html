<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>呂老闆重返的日子</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container">
    <section class="card">
      <p class="eyebrow">COUNTDOWN</p>
      <h1>呂老闆重返的日子</h1>

 

      <div class="countdown" aria-label="倒數計時">
        <div class="time-box">
          <span id="days">000</span>
          <small>天</small>
        </div>
        <div class="time-box">
          <span id="hours">00</span>
          <small>小時</small>
        </div>
        <div class="time-box">
          <span id="minutes">00</span>
          <small>分鐘</small>
        </div>
        <div class="time-box">
          <span id="seconds">00</span>
          <small>秒</small>
        </div>
      </div>

      <div class="progress-wrap">
        <div class="progress-info">
          <span>進度</span>
          <span id="progressText">0%</span>
        </div>
        <div class="progress-bar">
          <div id="progressFill"></div>
        </div>
      </div>

      <p id="message" class="message">距離重返的日子越來越近。</p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
